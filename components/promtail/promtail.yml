server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Collect Kong proxy access logs from Docker
  - job_name: kong_access_logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["kong"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: /kong
        action: keep
      - source_labels: [__meta_docker_container_name]
        target_label: container
        replacement: "kong"
      - target_label: service_name
        replacement: "kong-gateway"
      - target_label: job
        replacement: "kong_access"
    pipeline_stages:
      # Parse nginx access log format:
      # IP - - [date] "METHOD /path HTTP/1.1" status bytes "-" "agent" kong_request_id: "..."
      - regex:
          expression: '^(?P<client_ip>[\d.]+) - - \[(?P<time>[^\]]+)\] "(?P<method>\w+) (?P<path>[^\s]+) HTTP/[\d.]+\" (?P<status>\d+) (?P<bytes>\d+)'
      - labels:
          method:
          status:
      # Extract route from path (e.g., /service1 -> /service1)
      - regex:
          source: path
          expression: '^(?P<route>/[^/?]+)'
      - labels:
          route:
      # Extract X-Trace-Id from Kong logs if present (OTel trace propagation)
      - regex:
          expression: 'kong_request_id: "(?P<request_id>[a-f0-9]+)"'
      # Drop admin API, metrics, and health check spam logs
      - match:
          selector: '{service_name="kong-gateway"}'
          stages:
            - regex:
                source: path
                expression: '^/(metrics|status|health|plugins|routes|services)'
            - drop:
                source: path
                expression: '^/(metrics|status|health|plugins|routes|services)'

  # Also collect OTel system logs that Kong sends
  - job_name: kong_otel_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: kong_otel
          service_name: kong-gateway
          __path__: /var/log/kong/*.log
