server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: '/.*kong-run.*'
        target_label: service_name
        replacement: kong-gateway
    pipeline_stages:
      # Parse the Docker JSON log format to extract 'stream' (stdout/stderr) and the message
      - docker: {}
      # For Kong, drop all stdout logs (as OTLP natively handles access logs)
      - match:
          selector: '{service_name="kong-gateway", stream="stdout"}'
          action: drop
          drop_counter_reason: "otlp_handles_access_logs"
