global:
  scrape_interval: 15s
  scrape_timeout: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: kong
    metrics_path: /metrics
    static_configs:
      - targets: ['kong:8001']

  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ['keycloak:8080']
