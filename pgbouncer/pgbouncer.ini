[databases]
kong = host=db port=5432 dbname=kong
keycloak = host=db port=5432 dbname=keycloak
grafana = host=db port=5432 dbname=grafana

[pgbouncer]
listen_port = 6432
listen_addr = 0.0.0.0
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
pool_mode = session
max_client_conn = 1000
default_pool_size = 30
ignore_startup_parameters = extra_float_digits
